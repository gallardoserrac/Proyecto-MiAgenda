<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../img/favicon-32x32.png" type="image/png">
    <link rel="stylesheet" href="inicio-sesion.css">
    <title>MiAgenda - Inicio de Sesión</title>
</head>
<body>
<main>
  <div class="contenedor">
    <div class="izquierda">
      <img src="../../img/android-chrome-192x192.png" alt="Logo MiAgenda">
      <div class="texto-izquierda">
        <h2>¡Bienvenido de nuevo!</h2>
      </div>
    </div>
    <div class="linea-divisora"></div>
    <div class="derecha">
      <form action="../../backend/autentificacion/login.php" autocomplete="on" method="post">
        <fieldset>
          <legend>Inicio de Sesión</legend>
          <label for="email">Correo electrónico</label>
          <input type="email" name="email" id="email" placeholder="Correo Electrónico" autocomplete="email" required>
          <label for="password">Contraseña</label>
          <input type="password" name="password" id="password" placeholder="Contraseña" minlength="8" autocomplete="current-password" required>
        </fieldset>
        <div class="botones">
          <button type="submit">Iniciar sesión</button>
          <button type="reset">Borrar</button>
        </div>
        <p class="cuenta">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
      </form>
    </div>
  </div>
</main>
</body>
</html>
