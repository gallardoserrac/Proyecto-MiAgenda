<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../img/favicon-32x32.png" type="image/png">
    <link rel="stylesheet" href="registro.css">
    <title>MiAgenda - Registro</title>
</head>
<body>
<main>
  <div class="contenedor">
    <div class="izquierda">
      <img src="../../img/android-chrome-192x192.png" alt="Logo MiAgenda">
      <div class="texto-izquierda">
        <h2>¡Bienvenido!</h2>
        <h3>Únete a MiAgenda para superar todo lo que te propongas</h3>
        <h3>y tener un futuro brillante de manera ordenada</h3>
      </div>
    </div>
    <div class="linea-divisora"></div>
    <div class="derecha">
      <form action="../../backend/autentificacion/registro.php" autocomplete="on" method="post">
        <fieldset>
          <legend>Registro de Usuario</legend>
          <label for="usuario">Usuario</label>
          <input type="text" name="usuario" id="usuario" placeholder="Usuario" minlength="3" maxlength="15" autocomplete="username" required>
          <label for="email">Correo Electrónico</label>
          <input type="email" name="email" id="email" placeholder="Correo Electrónico" autocomplete="email" required>
          <label for="password">Contraseña</label>
          <input type="password" name="password" id="password" placeholder="Contraseña" minlength="8" autocomplete="new-password" required>
          <label for="confirmarcontrasena">Confirmar Contraseña</label>
          <input type="password" name="confirmarcontrasena" id="confirmarcontrasena" placeholder="Confirmar Contraseña" minlength="8" autocomplete="new-password" required>
          <label for="fechanacimiento">Fecha de Nacimiento</label>
          <input type="date" name="fechanacimiento" id="fechanacimiento">
        </fieldset>
        <div class="botones">
          <button type="submit">Registrarse</button>
          <button type="reset">Borrar</button>
        </div>
        <p class="cuenta">¿Ya tienes cuenta? <a href="inicio-sesion.html">Inicia sesión</a></p>
      </form>
    </div>
  </div>
</main>
</body>
</html>
